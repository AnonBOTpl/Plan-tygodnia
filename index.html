<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Plan Tygodnia</title>
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333333;
            --highlight: #e74c3c;
            --success: #2ecc71;
            --border: #e1e8ed;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .clock {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--primary);
            margin-top: 5px;
        }
        .day-name {
            font-size: 1.2rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .settings {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap; /* Pozwala na ułożenie elementów w kilku wierszach na telefonie */
            justify-content: space-between;
            gap: 10px;
        }
        .settings div {
            flex: 1 1 30%; /* Każdy element zajmie ok 30% szerokości, na małym ekranie się zwinie */
            min-width: 120px;
        }
        select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.95rem;
            width: 100%;
            background-color: #fff;
            margin-top: 5px;
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            text-align: center;
        }
        .now-playing {
            border: 2px solid var(--success);
            border-left: 8px solid var(--success);
        }
        .up-next {
            border: 2px solid var(--primary);
            border-left: 8px solid var(--primary);
        }
        .urgent {
            border: 2px solid var(--highlight);
            border-left: 8px solid var(--highlight);
            animation: pulse 2s infinite;
        }
        .title-label {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }
        .event-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 5px 0;
            color: #222;
        }
        .event-time {
            font-size: 1.1rem;
            color: #555;
            background: #f0f4f8;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 5px;
        }
        .countdown {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--highlight);
            margin-top: 15px;
        }
        .schedule-list {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .schedule-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .schedule-item:last-child {
            border-bottom: none;
        }
        .schedule-item .time {
            font-weight: bold;
            color: var(--primary);
            min-width: 110px;
        }
        .schedule-item.active-item {
            background-color: #eafaf1;
            padding-left: 10px;
            border-radius: 8px;
            border-bottom: none;
        }
        .schedule-item.active-item .time {
            color: var(--success);
        }
        button.notify-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.3s;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;">Mój Plan</h2>
        <div class="clock" id="clock">00:00:00</div>
        <div class="day-name" id="day-name">Dzień</div>
    </div>

    <button id="notify-button" class="notify-btn" onclick="requestNotifications()">Włącz powiadomienia (Test)</button>

    <!-- Zmieniona sekcja ustawień - doszedł czas powiadomienia -->
    <div class="settings">
        <div>
            <label style="font-size:0.75rem; color:#666; font-weight:bold;">TYDZIEŃ:</label>
            <select id="week-select" onchange="saveSettings()">
                <option value="0">Tydzień 0</option>
                <option value="I">Tydzień I</option>
                <option value="II">Tydzień II</option>
                <option value="III">Tydzień III</option>
                <option value="IV">Tydzień IV</option>
                <option value="V">Tydzień V</option>
                <option value="VI">Tydzień VI</option>
                <option value="VII">Tydzień VII</option>
            </select>
        </div>
        <div>
            <label style="font-size:0.75rem; color:#666; font-weight:bold;">GRUPA:</label>
            <select id="group-select" onchange="saveSettings()">
                <option value="A">Grupa A</option>
                <option value="B">Grupa B</option>
                <option value="C">Grupa C</option>
            </select>
        </div>
        <div>
            <label style="font-size:0.75rem; color:#666; font-weight:bold;">PRZYPOMNIJ:</label>
            <select id="notify-time-select" onchange="saveSettings()">
                <option value="5">5 min przed</option>
                <option value="10">10 min przed</option>
                <option value="15">15 min przed</option>
                <option value="20">20 min przed</option>
                <option value="30">30 min przed</option>
                <option value="0">Wyłączone</option>
            </select>
        </div>
    </div>

    <div class="card now-playing" id="current-event-card" style="display:none;">
        <div class="title-label">Teraz trwa</div>
        <div class="event-title" id="current-title">Wczytywanie...</div>
        <div class="event-time" id="current-time">--:--</div>
    </div>

    <div class="card up-next" id="next-event-card" style="display:none;">
        <div class="title-label">Następnie</div>
        <div class="event-title" id="next-title">Wczytywanie...</div>
        <div class="event-time" id="next-time">--:--</div>
        <div class="countdown" id="countdown">Za: -- min</div>
    </div>

    <div class="schedule-list">
        <h3 style="margin-top:0; border-bottom:2px solid #eee; padding-bottom:10px; color:#444;">Plan na dziś</h3>
        <div id="daily-list"></div>
    </div>
</div>

    const dayNames =["Niedziela", "Poniedziałek", "Wtorek", "Środa", "Czwartek", "Piątek", "Sobota"];
    let notifiedEvents =[];

    // --- FUNKCJE ZAPISYWANIA USTAWIEŃ ---
    function loadSettings() {
        const savedWeek = localStorage.getItem('myWeek');
        const savedGroup = localStorage.getItem('myGroup');
        const savedTime = localStorage.getItem('myNotifyTime');

        if (savedWeek) document.getElementById('week-select').value = savedWeek;
        if (savedGroup) document.getElementById('group-select').value = savedGroup;
        if (savedTime) document.getElementById('notify-time-select').value = savedTime;
    }

    function saveSettings() {
        localStorage.setItem('myWeek', document.getElementById('week-select').value);
        localStorage.setItem('myGroup', document.getElementById('group-select').value);
        localStorage.setItem('myNotifyTime', document.getElementById('notify-time-select').value);
        updateApp();
    }

    // --- FUNKCJE POMOCNICZE ---
    function getTodaySchedule() {
        const today = new Date().getDay();
        const selectedWeek = document.getElementById('week-select').value;
        const selectedGroup = document.getElementById('group-select').value;
        
        let filtered = rawSchedule[today].filter(ev => 
            ev.weeks.includes(selectedWeek) && ev.groups.includes(selectedGroup)
        );
        filtered.sort((a, b) => timeToMins(a.start) - timeToMins(b.start));
        return filtered;
    }

    function timeToMins(timeStr) {
        const parts = timeStr.split(':');
        return parseInt(parts[0]) * 60 + parseInt(parts[1]);
    }

    function requestNotifications() {
        if (!("Notification" in window)) {
            alert("Niestety, Twoja przeglądarka nie obsługuje powiadomień systemowych.");
            return;
        }
        if (Notification.permission === "granted") {
            wykonajTest();
            return;
        }
        Notification.requestPermission().then(permission => {
            if (permission === "granted") {
                ustawPrzyciskNaAktywny();
                wykonajTest();
            } else if (permission === "denied") {
                alert("Powiadomienia zostały zablokowane w przeglądarce.");
            }
        });
    }

    function wykonajTest() {
        new Notification("Test Powiadomienia 🔔", { 
            body: "Super, wszystko działa! Otrzymasz przypomnienie przed swoimi zajęciami.",
            icon: "https://cdn-icons-png.flaticon.com/512/3239/3239952.png"
        });
    }

    function ustawPrzyciskNaAktywny() {
        const btn = document.getElementById('notify-button');
        btn.innerText = "Powiadomienia włączone ✅ (kliknij, aby przetestować)";
        btn.style.background = "var(--success)";
    }

    function sendNotification(title, body) {
        if ("Notification" in window && Notification.permission === "granted") {
            new Notification(title, { body: body, icon: "https://cdn-icons-png.flaticon.com/512/3239/3239952.png" });
        }
    }

    // --- GŁÓWNA LOGIKA APLIKACJI ---
    function updateApp() {
        const now = new Date();
        const currentMins = now.getHours() * 60 + now.getMinutes();
        
        document.getElementById('clock').innerText = now.toLocaleTimeString('pl-PL', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        document.getElementById('day-name').innerText = dayNames[now.getDay()];

        const schedule = getTodaySchedule();
        let currentEvent = null, nextEvent = null;

        for (let i = 0; i < schedule.length; i++) {
            let startMins = timeToMins(schedule[i].start);
            let endMins = timeToMins(schedule[i].end);

            if (currentMins >= startMins && currentMins < endMins) {
                currentEvent = schedule[i];
                if (i + 1 < schedule.length) nextEvent = schedule[i + 1];
            } else if (currentMins < startMins && !nextEvent && !currentEvent) {
                nextEvent = schedule[i];
            }
        }

        const currentCard = document.getElementById('current-event-card');
        if (currentEvent) {
            currentCard.style.display = 'block';
            document.getElementById('current-title').innerText = currentEvent.title;
            document.getElementById('current-time').innerText = `${currentEvent.start} - ${currentEvent.end}`;
        } else {
            currentCard.style.display = 'block';
            document.getElementById('current-title').innerText = "Czas wolny / Przerwa";
            document.getElementById('current-time').innerText = "Odpocznij chwilę!";
        }

        const nextCard = document.getElementById('next-event-card');
        if (nextEvent) {
            nextCard.style.display = 'block';
            document.getElementById('next-title').innerText = nextEvent.title;
            document.getElementById('next-time').innerText = `${nextEvent.start} - ${nextEvent.end}`;
            
            let minsToNext = timeToMins(nextEvent.start) - currentMins;
            document.getElementById('countdown').innerText = `Rozpocznie się za: ${minsToNext} min`;
            
            // Logika nowego wyboru powiadomień
            let targetNotifyTime = parseInt(document.getElementById('notify-time-select').value);
            
            // Pulsowanie kafelka na czerwono
            if (minsToNext <= targetNotifyTime && targetNotifyTime > 0 && minsToNext > 0) {
                nextCard.classList.add('urgent');
            } else {
                nextCard.classList.remove('urgent');
            }

            // Wysyłanie powiadomienia (tylko raz dla danego wydarzenia na wybrany czas)
            if (targetNotifyTime > 0 && minsToNext <= targetNotifyTime && minsToNext > 0) {
                const uniqueNotifyKey = nextEvent.title + "_notify_" + targetNotifyTime;
                if (!notifiedEvents.includes(uniqueNotifyKey)) {
                    sendNotification("Za chwilę zajęcia!", `Za ok. ${minsToNext} minut zaczyna się: ${nextEvent.title}`);
                    notifiedEvents.push(uniqueNotifyKey);
                }
            }
        } else {
            nextCard.style.display = 'none';
        }

        const listContainer = document.getElementById('daily-list');
        listContainer.innerHTML = '';
        schedule.forEach(ev => {
            let div = document.createElement('div');
            div.className = 'schedule-item';
            if (currentEvent && ev.title === currentEvent.title && ev.start === currentEvent.start) {
                div.classList.add('active-item');
            }
            div.innerHTML = `<span class="time">${ev.start} - ${ev.end}</span> <span class="title">${ev.title}</span>`;
            listContainer.appendChild(div);
        });
    }

    // Uruchamianie
    loadSettings();
    if ("Notification" in window && Notification.permission === "granted") {
        ustawPrzyciskNaAktywny();
    }
    updateApp();
    setInterval(updateApp, 1000);
</script>
</body>
</html>
