<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Plan Tygodnia</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a90e2">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3239/3239952.png">
    
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333333;
            --highlight: #e74c3c;
            --success: #2ecc71;
            --border: #e1e8ed;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; }
        .header { text-align: center; margin-bottom: 20px; }
        .clock { font-size: 2.2rem; font-weight: bold; color: var(--primary); margin-top: 5px; }
        .day-name { font-size: 1.2rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .settings { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 10px; }
        .settings div { flex: 1 1 30%; min-width: 120px; }
        select { padding: 10px; border-radius: 8px; border: 1px solid var(--border); font-size: 0.95rem; width: 100%; background-color: #fff; margin-top: 5px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; text-align: center; }
        .now-playing { border: 2px solid var(--success); border-left: 8px solid var(--success); }
        .up-next { border: 2px solid var(--primary); border-left: 8px solid var(--primary); }
        .urgent { border: 2px solid var(--highlight); border-left: 8px solid var(--highlight); animation: pulse 2s infinite; }
        .title-label { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
        .event-title { font-size: 1.5rem; font-weight: bold; margin: 5px 0; color: #222; }
        .event-time { font-size: 1.1rem; color: #555; background: #f0f4f8; display: inline-block; padding: 4px 12px; border-radius: 20px; margin-top: 5px; }
        .event-room { font-size: 1rem; color: #1e8449; background: #eafaf1; display: inline-block; padding: 4px 12px; border-radius: 20px; margin-top: 5px; font-weight: bold; border: 1px solid #c2eadd; }
        .countdown { font-size: 1.2rem; font-weight: bold; color: var(--highlight); margin-top: 15px; }
        .schedule-list { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .schedule-item { display: flex; flex-wrap: wrap; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .schedule-item:last-child { border-bottom: none; }
        .schedule-item .time { font-weight: bold; color: var(--primary); min-width: 110px; }
        .schedule-item.active-item { background-color: #f8f9fa; padding-left: 10px; border-radius: 8px; border-left: 4px solid var(--success); border-bottom: none; }
        .schedule-item.active-item .time { color: var(--success); }
        button.notify-btn { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: background 0.3s; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); } 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); } }
    </style>
</head>

    function playBeep() {
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, ctx.currentTime);
            gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
            osc.start();
            osc.stop(ctx.currentTime + 0.3);
        } catch(e) {}
    }

    function loadSettings() {
        const savedWeek = localStorage.getItem('myWeek');
        const savedGroup = localStorage.getItem('myGroup');
        const savedTime = localStorage.getItem('myNotifyTime');

        if (savedWeek) document.getElementById('week-select').value = savedWeek;
        if (savedGroup) document.getElementById('group-select').value = savedGroup;
        if (savedTime) document.getElementById('notify-time-select').value = savedTime;
    }

    function saveSettings() {
        localStorage.setItem('myWeek', document.getElementById('week-select').value);
        localStorage.setItem('myGroup', document.getElementById('group-select').value);
        localStorage.setItem('myNotifyTime', document.getElementById('notify-time-select').value);
        updateApp();
    }

    function getTodaySchedule() {
        const today = new Date().getDay();
        const selectedWeek = document.getElementById('week-select').value;
        const selectedGroup = document.getElementById('group-select').value;
        let filtered = rawSchedule[today].filter(ev => ev.weeks.includes(selectedWeek) && ev.groups.includes(selectedGroup));
        filtered.sort((a, b) => timeToMins(a.start) - timeToMins(b.start));
        return filtered;
    }

    function timeToMins(timeStr) {
        const parts = timeStr.split(':');
        return parseInt(parts[0]) * 60 + parseInt(parts[1]);
    }

    function getRoomStr(ev) {
        if (!ev.room) return "";
        let group = document.getElementById('group-select').value;
        if (typeof ev.room === 'object') {
            return ev.room[group] || "";
        }
        return ev.room;
    }

    function requestNotifications() {
        playBeep();
        if (!("Notification" in window)) {
            alert("Twoja przeglądarka nie obsługuje powiadomień.");
            return;
        }
        if (Notification.permission === "granted") {
            wykonajTest();
            return;
        }
        Notification.requestPermission().then(permission => {
            if (permission === "granted") {
                ustawPrzyciskNaAktywny();
                wykonajTest();
            } else {
                alert("Powiadomienia zostały zablokowane. Aplikacja będzie ostrzegać Cię tylko dźwiękiem.");
            }
        });
    }

    function wykonajTest() {
        if ('serviceWorker' in navigator && navigator.serviceWorker.ready) {
            navigator.serviceWorker.ready.then(function(registration) {
                registration.showNotification("Test Powiadomienia 🔔", {
                    body: "Działa! Takie okienko pojawi się na górnym pasku telefonu.",
                    icon: "https://cdn-icons-png.flaticon.com/512/3239/3239952.png",
                    vibrate:[200, 100, 200, 100, 200],
                    requireInteraction: true
                });
            });
        }
        alert("Wysłano test powiadomienia na pasek zadań!");
    }

    function ustawPrzyciskNaAktywny() {
        const btn = document.getElementById('notify-button');
        btn.innerText = "Powiadomienia aktywne ✅ (kliknij by sprawdzić)";
        btn.style.background = "var(--success)";
    }

    function sendRealNotification(title, text) {
        playBeep(); 

        if ('serviceWorker' in navigator && navigator.serviceWorker.ready && Notification.permission === "granted") {
            navigator.serviceWorker.ready.then(function(registration) {
                registration.showNotification(title, {
                    body: text,
                    icon: "https://cdn-icons-png.flaticon.com/512/3239/3239952.png",
                    vibrate:[200, 100, 200, 100, 200],
                    requireInteraction: true 
                });
            });
        } else {
            alert("🔔 PRZYPOMNIENIE: \n\n" + text);
        }
    }

    function updateApp() {
        const now = new Date();
        const currentMins = now.getHours() * 60 + now.getMinutes();
        
        document.getElementById('clock').innerText = now.toLocaleTimeString('pl-PL', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        document.getElementById('day-name').innerText = dayNames[now.getDay()];

        const schedule = getTodaySchedule();
        let currentEvent = null, nextEvent = null;

        for (let i = 0; i < schedule.length; i++) {
            let startMins = timeToMins(schedule[i].start);
            let endMins = timeToMins(schedule[i].end);
            if (currentMins >= startMins && currentMins < endMins) {
                currentEvent = schedule[i];
                if (i + 1 < schedule.length) nextEvent = schedule[i + 1];
            } else if (currentMins < startMins && !nextEvent && !currentEvent) {
                nextEvent = schedule[i];
            }
        }

        // Aktualizacja karty TERAZ
        const currentCard = document.getElementById('current-event-card');
        const currentRoomEl = document.getElementById('current-room');
        if (currentEvent) {
            currentCard.style.display = 'block';
            document.getElementById('current-title').innerText = currentEvent.title;
            document.getElementById('current-time').innerText = `${currentEvent.start} - ${currentEvent.end}`;
            
            let roomStr = getRoomStr(currentEvent);
            if (roomStr) {
                currentRoomEl.innerText = `📍 ${roomStr}`;
                currentRoomEl.style.display = 'inline-block';
            } else {
                currentRoomEl.style.display = 'none';
            }
        } else {
            currentCard.style.display = 'block';
            document.getElementById('current-title').innerText = "Czas wolny / Przerwa";
            document.getElementById('current-time').innerText = "Odpocznij chwilę!";
            currentRoomEl.style.display = 'none';
        }

        // Aktualizacja karty NASTĘPNIE
        const nextCard = document.getElementById('next-event-card');
        const nextRoomEl = document.getElementById('next-room');
        if (nextEvent) {
            nextCard.style.display = 'block';
            document.getElementById('next-title').innerText = nextEvent.title;
            document.getElementById('next-time').innerText = `${nextEvent.start} - ${nextEvent.end}`;
            
            let roomStr = getRoomStr(nextEvent);
            if (roomStr) {
                nextRoomEl.innerText = `📍 ${roomStr}`;
                nextRoomEl.style.display = 'inline-block';
            } else {
                nextRoomEl.style.display = 'none';
            }
            
            let minsToNext = timeToMins(nextEvent.start) - currentMins;
            document.getElementById('countdown').innerText = `Rozpocznie się za: ${minsToNext} min`;
            
            let targetNotifyTime = parseInt(document.getElementById('notify-time-select').value);
            
            if (minsToNext <= targetNotifyTime && targetNotifyTime > 0 && minsToNext > 0) {
                nextCard.classList.add('urgent');
            } else {
                nextCard.classList.remove('urgent');
            }

            if (targetNotifyTime > 0 && minsToNext === targetNotifyTime) {
                const uniqueNotifyKey = nextEvent.title + "_t_" + targetNotifyTime + "_d_" + now.getDate();
                if (!notifiedEvents.includes(uniqueNotifyKey)) {
                    notifiedEvents.push(uniqueNotifyKey);
                    
                    let notifyRoom = roomStr ? `Sala: ${roomStr}` : "Brak przypisanej sali";
                    sendRealNotification("Zaraz zajęcia!", `Zaczyna się: ${nextEvent.title}\n${notifyRoom}`);
                }
            }
        } else {
            nextCard.style.display = 'none';
        }

        // Aktualizacja pełnej listy na dole
        const listContainer = document.getElementById('daily-list');
        listContainer.innerHTML = '';
        schedule.forEach(ev => {
            let div = document.createElement('div');
            div.className = 'schedule-item';
            if (currentEvent && ev.title === currentEvent.title && ev.start === currentEvent.start) {
                div.classList.add('active-item');
            }
            
            let roomStr = getRoomStr(ev);
            let roomHtml = roomStr ? `<span style="font-size:0.85rem; background:#eafaf1; color:#2ecc71; padding:3px 8px; border-radius:12px; font-weight:bold; white-space:nowrap; margin-left:auto;">📍 ${roomStr}</span>` : '';
            
            div.innerHTML = `
                <span class="time">${ev.start} - ${ev.end}</span> 
                <span class="title" style="flex-grow:1; padding-left:10px;">${ev.title}</span>
                ${roomHtml}
            `;
            listContainer.appendChild(div);
        });
    }

    document.body.addEventListener('click', function() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if(AudioContext) {
            const audioCtx = new AudioContext();
            audioCtx.resume();
        }
    }, { once: true });

    loadSettings();
    if ("Notification" in window && Notification.permission === "granted") {
        ustawPrzyciskNaAktywny();
    }
    updateApp();
    setInterval(updateApp, 1000);
</script>
</body>
</html>
